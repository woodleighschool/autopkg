Description: Downloads the latest version of GlobalProtect and imports it into Munki.
Identifier: com.github.woodleighschool.munki.GlobalProtect
ParentRecipe: com.github.woodleighschool.download.GlobalProtect

MinimumVersion: "1.1.0"

Input:
  MUNKI_CATEGORY: Security
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: GlobalProtect
  pkginfo:
    blocking_applications: []
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      The Palo Alto VPN client is required to access organizational resources
      outside of the school network.
    developer: Palo Alto
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: uninstall_script
    uninstall_script: |-
      #!/bin/sh
      /Applications/GlobalProtect.app/Contents/Resources/uninstall_gp.sh || :
    uninstallable: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications/GlobalProtect.app"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/gp.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/GlobalProtect.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"