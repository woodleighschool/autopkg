Identifier: com.github.woodleighschool.intune.Vivi
ParentRecipe: com.github.woodleighschool.pkg.Vivi
MinimumVersion: "2.3"

Input:
  DESCRIPTION: >-
    Vivi is the only scalable, easy-to-use wireless screensharing and student
    engagement platform engineered for, and by, the education sector. Any
    device, any number of users or classrooms, any media type, any learning
    type, any display.
  INSTALL_COMMAND: msiexec /i "__SETUP_FILE__" /qn /norestart
  KEEP_VERSION_COUNT: "1"
  MINIMUM_SUPPORTED_WINDOWS_RELEASE: Windows11_23H2
  NAME: Vivi
  PUBLISHER: Vivi
  UNINSTALL_COMMAND: msiexec /x "__MSI_PRODUCT_CODE__" /qn /norestart
  UPDATE_MODE: available_supersedence

Process:
  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneWin32AppUploader
    Arguments:
      architecture:
        - amd64
      assignment_info:
        - group_id: c20bc8d2-b2d7-4257-acd1-c292c13a2acc #ITStaff
          intent: available
      categories:
        - Education
      description: "%DESCRIPTION%"
      detection_type: msi_product_version_at_least
      display_name: "%NAME%"
      install_command: "%INSTALL_COMMAND%"
      intunewin_path: "%intunewin_path%"
      minimum_supported_windows_release: "%MINIMUM_SUPPORTED_WINDOWS_RELEASE%"
      publisher: "%PUBLISHER%"
      setup_file: "%setup_file%"
      uninstall_command: "%UNINSTALL_COMMAND%"
      update_mode: "%UPDATE_MODE%"
      version: "%version%"

  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneWin32SupersedenceUploader
    Arguments:
      display_name: "%NAME%"
      supersedence_type: update

  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneWin32AppCleaner
    Arguments:
      display_name: "%NAME%"
      force: true
      keep_version_count: "%KEEP_VERSION_COUNT%"