---
Description: Downloads the latest version of Vivi and imports it into Munki.
Identifier: com.github.woodleighschool.munki.Vivi
MinimumVersion: "1.1.0"
ParentRecipe: com.github.woodleighschool.download.Vivi

Input:
  NAME: Vivi
  MUNKI_CATEGORY: Education
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - Vivi
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Vivi is the only scalable, easy-to-use wireless screensharing and student
      engagement platform engineered for, and by, the education sector. Any
      device, any number of users or classrooms, any media type, any learning
      type, any display.
    developer: Vivi
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: removepackages
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/au.com.viviaustralia.mac.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Vivi.app
      derive_minimum_os_version: true

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"
