Description: Downloads the latest version of Microsoft Teams and imports it into Munki.
Identifier: com.github.woodleighschool.munki.MicrosoftTeams
ParentRecipe: com.github.rtrouton.download.microsoftteams

MinimumVersion: "2.7"

Input:
  MUNKI_CATEGORY: Productivity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Microsoft Teams
  pkginfo:
    blocking_applications:
      - Microsoft Teams (work or school)
      - Microsoft Teams
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Microsoft Teams is your modern solution for seamless collaboration and communication
      in the digital workplace. This platform brings together chat, video meetings, file collaboration,
      and integrated app functionalities in one place.
    developer: Microsoft
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: removepackages
    uninstallable: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/MicrosoftTeams_app.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Microsoft Teams.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"