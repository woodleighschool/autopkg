Identifier: com.github.woodleighschool.intune.Sophos
ParentRecipe: com.github.woodleighschool.pkg.Sophos
MinimumVersion: "2.3"

Input:
  DESCRIPTION: >-
    By combining cutting-edge technologies, such as deep learning and endpoint
    detection and response, Intercept X delivers unmatched protection against
    unknown malware, exploits, and ransomware.
  DETECTION_FILE_OR_FOLDER: Sophos UI.exe
  DETECTION_PATH: C:\Program Files\Sophos\Sophos UI
  ICON_PATH: "%RECIPE_DIR%/Assets/Sophos.png"
  INSTALL_COMMAND: '"__SETUP_FILE__" --quiet'
  MINIMUM_SUPPORTED_WINDOWS_RELEASE: Windows11_23H2
  NAME: Sophos
  PUBLISHER: Sophos
  UNINSTALL_COMMAND: >-
    powershell.exe -ExecutionPolicy Bypass -NoProfile -Command "$p='C:\Program
    Files\Sophos\Sophos Endpoint Agent\SophosUninstall.exe'; if (Test-Path $p) {
    Start-Process -FilePath $p -ArgumentList '--quiet' -Wait }"
  UPDATE_MODE: in_place
  VERSION: "1.0"

Process:
  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneWin32AppUploader
    Arguments:
      architecture:
        - amd64
        - arm64
      assignment_info:
        - group_id: c20bc8d2-b2d7-4257-acd1-c292c13a2acc #ITStaff
          intent: available
      categories:
        - Security
      description: "%DESCRIPTION%"
      detection_file_or_folder: "%DETECTION_FILE_OR_FOLDER%"
      detection_path: "%DETECTION_PATH%"
      detection_type: file_exists
      display_name: "%NAME%"
      icon_path: "%ICON_PATH%"
      install_command: "%INSTALL_COMMAND%"
      intunewin_path: "%intunewin_path%"
      minimum_supported_windows_release: "%MINIMUM_SUPPORTED_WINDOWS_RELEASE%"
      publisher: "%PUBLISHER%"
      setup_file: "%setup_file%"
      uninstall_command: "%UNINSTALL_COMMAND%"
      update_mode: "%UPDATE_MODE%"
      version: "%VERSION%"