Identifier: com.github.woodleighschool.pkg.Sophos

Input:
  NAME: Sophos

Process:
  - Processor: Unarchiver
    Arguments:
      archive_path: "%RECIPE_DIR%/Assets/SophosInstall.zip"
      destination_path: "%RECIPE_CACHE_DIR%/unzip"
      purge_destination: true

  - Processor: PkgRootCreator
    Arguments:
      pkgdirs:
        Library/Application Support/Woodleigh/Sophos: "0755"
      pkgroot: "%RECIPE_CACHE_DIR%/%NAME%/ROOT"

  - Processor: Copier
    Arguments:
      destination_path: "%pkgroot%/Library/Application Support/Woodleigh/Sophos"
      overwrite: true
      source_path: "%RECIPE_CACHE_DIR%/unzip"

  - Processor: PlistReader
    Arguments:
      info_path: "%RECIPE_CACHE_DIR%/unzip/Sophos Installer.app"
      plist_keys:
        CFBundleIdentifier: bundle_id
        CFBundleShortVersionString: version
        CFBundleVersion: build_version

  - Processor: PkgCreator
    Arguments:
      pkg_request:
        chown:
          - group: wheel
            path: Library/Application Support/Woodleigh/Sophos
            user: root
        id: "%bundle_id%"
        options: purge_ds_store
        pkgname: "%NAME%-%version%-%REVISION%"
        version: "%version%-%REVISION%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unzip"
        - "%RECIPE_CACHE_DIR%/%NAME%"