---
Description: Downloads the latest version of Company Portal and imports it into Munki.
Identifier: com.github.woodleighschool.munki.CompanyPortal
MinimumVersion: "2.7"
ParentRecipe: com.github.rtrouton.download.MicrosoftIntuneCompanyPortal

Input:
  NAME: Company Portal
  MUNKI_CATEGORY: Productivity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - Company Portal
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      The Company Portal provides access to corporate apps and resources from
      almost any network. Your company must already subscribe to Microsoft
      Intune, and your IT admin must set up your account before you can use
      this app.
    developer: Microsoft
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: removepackages
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/CompanyPortal-Component.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Company Portal.app
      derive_minimum_os_version: true

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"
