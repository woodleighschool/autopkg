---
Description: Downloads the latest version of TI-Nspire CX Premium Teacher Software and imports it into Munki.
Identifier: com.github.woodleighschool.munki.TI-NspireTeacher
ParentRecipe: com.github.woodleighschool.download.TI-NspireTeacher

MinimumVersion: "1.0.0"

Input:
  MUNKI_CATEGORY: Education
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: TI-Nspire CX Premium Teacher Software
  pkginfo:
    blocking_applications:
      - TI-Nspire CX Premium Teacher Software
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Powerful teacher software that turns a teacher's PC or Mac into a virtual
      TI-Nspire CX graphing calculator environment and supports classroom
      presentation and management workflows.
    developer: Texas Instruments
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: removepackages
    uninstallable: true

Process:
  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/TI-Nspire CX Premium Teacher Software.app
      version_comparison_key: CFBundleShortVersionString

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
