---
Description: Downloads the latest version of TI-Nspire CX Premium Teacher Software.
Identifier: com.github.woodleighschool.download.TI-NspireTeacher
MinimumVersion: "1.0.0"

Input:
  NAME: TI-Nspire-PremiumTeacher

Process:
  - Processor: URLTextSearcher
    Arguments:
      re_pattern: 'href="(/download/en/ed-tech/.*/.*/TINspireCXPremiumTeacherSoftware-.*\.dmg)"'
      result_output_var_name: download_path
      url: https://education.ti.com/en/software/details/en/B993F3BD97D94D7EA35E5D514DD57FB5/ti-nspirecx-tps_sda?sc_lang=en

  - Processor: URLDownloader
    Arguments:
      url: https://education.ti.com/%download_path%
      filename: "%NAME%.dmg"

  - Processor: EndOfCheckPhase

  - Processor: CodeSignatureVerifier
    Arguments:
      expected_authority_names:
        - "Developer ID Installer: Texas Instruments (TLEVLB8B5D)"
        - "Developer ID Certification Authority"
        - "Apple Root CA"
      input_path: "%pathname%/TINspireCXPremiumTeacherSoftware-*.pkg"

  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpack"
      flat_pkg_path: "%pathname%/TINspireCXPremiumTeacherSoftware-*.pkg"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpack/TI-NspireCXNavPrm.pkg/Payload"
      purge_destination: true
