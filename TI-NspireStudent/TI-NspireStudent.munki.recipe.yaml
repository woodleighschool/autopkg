---
Description: Downloads the latest version of TI-Nspire CX Student Software and imports it into Munki.
Identifier: com.github.woodleighschool.munki.TI-NspireStudent
MinimumVersion: "1.0.0"
ParentRecipe: com.github.dataJAR-recipes.download.TI-Nspire

Input:
  NAME: TI-Nspire CX Student Software
  MUNKI_CATEGORY: Education
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - TI-Nspire CX Student Software
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Powerful computer software with a Computer Algebra System (CAS) that
      satisfies math and science curriculum needs from middle school through
      college.
    developer: Texas Instruments
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: removepackages
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/TI-Nspire CX Student Software.app
      derive_minimum_os_version: true
      version_comparison_key: CFBundleShortVersionString

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"
