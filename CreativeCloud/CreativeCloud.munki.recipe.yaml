---
Description: Downloads the latest Apple Silicon Adobe Creative Cloud installer package and imports it into Munki.
Identifier: com.github.woodleighschool.munki.CreativeCloud
ParentRecipe: com.github.rtrouton.pkg.AdobeCreativeCloudInstallerAppleSilicon

MinimumVersion: "2.7"

Input:
  MUNKI_APP_PATH: /Applications/Utilities/Adobe Creative Cloud/ACC/Creative Cloud.app
  MUNKI_CATEGORY: Creativity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Adobe Creative Cloud
  pkginfo:
    blocking_applications:
      - Creative Cloud
      - Creative Cloud Desktop App
      - Creative Cloud Installer
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Adobe Creative Cloud provides access to Adobe desktop apps, services, and
      creative resources from the Creative Cloud desktop app.
    developer: Adobe
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    installcheck_script: |-
      #!/bin/bash
      if [[ -d "%MUNKI_APP_PATH%" ]]; then
        exit 1
      fi
      exit 0
    minimum_os_version: "11.0"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: uninstall_script
    uninstall_script: |-
      #!/bin/bash
      app_path="%MUNKI_APP_PATH%"
      uninstaller="/Applications/Utilities/Adobe Creative Cloud/Utils/Creative Cloud Uninstaller.app/Contents/MacOS/Creative Cloud Uninstaller"
      if [[ ! -d "$app_path" ]]; then
        exit 0
      fi
      if [[ ! -x "$uninstaller" ]]; then
        echo "Adobe Creative Cloud uninstaller not found: $uninstaller"
        exit 1
      fi
      "$uninstaller" --uninstall=1
      status=$?
      if [[ -d "$app_path" ]]; then
        echo "Adobe Creative Cloud is still installed."
        exit 1
      fi
      exit "$status"
    uninstallable: true
    uninstallcheck_script: |-
      #!/bin/bash
      if [[ -d "%MUNKI_APP_PATH%" ]]; then
        exit 0
      fi
      exit 1

Process:
  - Processor: MunkiPkginfoMerger
    Arguments:
      additional_pkginfo:
        receipts: []
        version: "%version%"

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pkg_path%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"
