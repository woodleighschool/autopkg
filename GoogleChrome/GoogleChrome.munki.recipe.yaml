---
Description: Downloads the latest version of Google Chrome Enterprise and imports it into Munki.
Identifier: com.github.woodleighschool.munki.GoogleChrome
ParentRecipe: com.github.autopkg.download.googlechromepkg

MinimumVersion: "2.7"

Input:
  MUNKI_CATEGORY: Productivity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Google Chrome
  pkginfo:
    blocking_applications:
      - Google Chrome
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Get more done with the new Google Chrome. A more simple, secure, and
      faster web browser than ever, with Google's smarts built-in.
    developer: Google
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpack"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpack/GoogleChrome.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Google Chrome.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/Google Chrome.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
        - "%RECIPE_CACHE_DIR%/unpack"
