---
Description: Downloads the latest version of UltiMaker Cura and imports it into Munki.
Identifier: com.github.woodleighschool.munki.UltiMakerCura
MinimumVersion: "1.1.0"
ParentRecipe: com.github.dataJAR-recipes.download.Ultimaker Cura

Input:
  NAME: UltiMaker Cura
  MUNKI_CATEGORY: STEAM
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - UltiMaker Cura
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      UltiMaker Cura is free, easy-to-use 3D printing software trusted by millions
      of users. Fine-tune your 3D model with 400+ settings for the best slicing
      and printing results.
    developer: UltiMaker
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: remove_copied_items
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: Copier
    Arguments:
      source_path: "%pathname%/%NAME%.app"
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      overwrite: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/%NAME%.app
      derive_minimum_os_version: true
      version_comparison_key: CFBundleShortVersionString

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      munkiimport_appname: "%NAME%.app"
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
