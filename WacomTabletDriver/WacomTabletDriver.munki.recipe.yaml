---
Description: Downloads the latest version of Wacom Tablet Driver and imports it into Munki.
Identifier: com.github.woodleighschool.munki.WacomTabletDriver
MinimumVersion: "1.1.0"
ParentRecipe: com.github.rustymyers.download.WacomTablet

Input:
  NAME: Wacom Tablet Driver
  MUNKI_CATEGORY: Creativity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - Wacom Center
      - Wacom Display Settings
      - Wacom Tablet Utility
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      These are the drivers needed to use any Wacom pad or display. You may
      need to reinstall these when you update your MacBook's OS.
    developer: Wacom
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: removepackages
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpack"
      flat_pkg_path: "%pathname%/Install Wacom Tablet.pkg"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpack/content.pkg/Payload"
      purge_destination: true

  - Processor: PlistReader
    Arguments:
      info_path: "%RECIPE_CACHE_DIR%/payload/Applications/Wacom Tablet.localized/.Tablet/WacomTabletDriver.app/Contents/Info.plist"
      plist_keys:
        CFBundleVersion: version
        LSMinimumSystemVersion: min_os_ver

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Wacom Tablet.localized/Wacom Center.app
        - /Applications/Wacom Tablet.localized/Wacom Display Settings.app
        - /Applications/Wacom Tablet.localized/Wacom Tablet Utility.app
        - /Applications/Wacom Tablet.localized/.Tablet/WacomTabletDriver.app
        - /Applications/Wacom Tablet.localized/.Tablet/WacomTouchDriver.app
        - /Applications/Wacom Tablet.localized/.Tablet/TabletDriver.app

  - Processor: MunkiPkginfoMerger
    Arguments:
      additional_pkginfo:
        minimum_os_version: "%min_os_ver%"
        version: "%version%"

  - Processor: PkgCopier
    Arguments:
      source_pkg: "%pathname%/Install Wacom Tablet.pkg"
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%.pkg"

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%.pkg"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/Wacom Tablet.localized/Wacom Center.app"
      NAME: "%NAME%"

  - Processor: com.github.woodleighschool.processors/PathChmod
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
        - "%RECIPE_CACHE_DIR%/unpack"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpack"
        - "%RECIPE_CACHE_DIR%/payload"
