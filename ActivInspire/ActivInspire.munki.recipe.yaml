---
Description: Downloads the latest version of ActivInspire and imports it into Munki.
Identifier: com.github.woodleighschool.munki.ActivInspire
ParentRecipe: com.github.dataJAR-recipes.download.ActivInspire

MinimumVersion: "1.1.0"

Input:
  ACTIVINSPIRE_SERIAL: ""
  MUNKI_CATEGORY: Education
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: ActivInspire
  pkginfo:
    blocking_applications:
      - Inspire
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      ActivInspire lesson delivery software is a free teaching software tool
      for classroom Interactive touchboards, displays, and whiteboards.
    developer: Promethean
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    postinstall_script: |
      #!/bin/bash
      mkdir -p "/Users/Shared/Promethean/ActivInspire"
      cat > "/Users/Shared/Promethean/ActivInspire/.inspire_license.xml" << EOF
      <?xml version="1.0" encoding="UTF-8"?>
      <License>
          <username>Woodleigh</username>
          <organization>Woodleigh</organization>
          <serial>%ACTIVINSPIRE_SERIAL%</serial>
      </License>
      EOF
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: removepackages
    uninstallable: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%/ActivInspire_Application_*_MAC.pkg"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/InspireInstaller.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Promethean/Activsoftware Inspire/Inspire.app

  - Processor: MunkiPkginfoMerger

  - Processor: PkgCopier
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%.pkg"
      source_pkg: "%pathname%/ActivInspire_Application_*_MAC.pkg"

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%.pkg"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/Promethean/Activsoftware Inspire/Inspire.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/%NAME%.pkg"
