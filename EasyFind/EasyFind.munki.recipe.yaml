Description: Downloads the latest version of EasyFind and imports it into Munki.
Identifier: com.github.woodleighschool.munki.EasyFind
ParentRecipe: com.github.jleggat.EasyFind.download

MinimumVersion: "1.1.0"

Input:
  APP_DESTINATION: /Applications/Utilities
  MUNKI_CATEGORY: Utilities
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: EasyFind
  pkginfo:
    blocking_applications:
      - EasyFind
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Spotlight is great, but sometimes you need something more specialized.
      EasyFind finds files and folders by name, content, tags, or comments
      using advanced Boolean operators, wildcards, phrases, even regular
      expressions. It does not require indexing, is fast, and uses very little
      memory.
    developer: DEVONtechnologies
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: remove_copied_items
    uninstallable: true

Process:
  - Processor: Unarchiver
    Arguments:
      archive_path: "%pathname%"
      destination_path: "%RECIPE_CACHE_DIR%/%NAME%"
      purge_destination: true

  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload%APP_DESTINATION%/%NAME%.app"
      overwrite: true
      source_path: "%RECIPE_CACHE_DIR%/%NAME%/%NAME%.app"

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - "%APP_DESTINATION%/%NAME%.app"

  - Processor: MunkiPkginfoMerger

  - Processor: DmgCreator
    Arguments:
      dmg_path: "%RECIPE_CACHE_DIR%/%NAME%.dmg"
      dmg_root: "%RECIPE_CACHE_DIR%/%NAME%"

  - Processor: MunkiImporter
    Arguments:
      additional_makepkginfo_options:
        - --destinationpath
        - "%APP_DESTINATION%"
      pkg_path: "%dmg_path%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/%NAME%/%NAME%.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/%NAME%"
        - "%RECIPE_CACHE_DIR%/%NAME%.dmg"
        - "%RECIPE_CACHE_DIR%/payload"