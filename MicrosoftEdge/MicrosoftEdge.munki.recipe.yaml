---
Description: Downloads the latest version of Microsoft Edge and imports it into Munki.
Identifier: com.github.woodleighschool.munki.MicrosoftEdge
ParentRecipe: com.github.rtrouton.download.microsoftedge

MinimumVersion: "2.7"

Input:
  MUNKI_CATEGORY: Productivity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Microsoft Edge
  pkginfo:
    blocking_applications:
      - Microsoft Edge
      - Microsoft Error Reporting
      - Microsoft AutoUpdate
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Get Microsoft Edge, your AI-powered browser, and explore a smarter way to browse, find,
      create and do beyond what you ever thought possible.
    developer: Microsoft
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: removepackages
    uninstallable: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: FileFinder
    Arguments:
      pattern: "%RECIPE_CACHE_DIR%/unpacked/*.pkg"

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications"
      pkg_payload_path: "%found_filename%/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Microsoft Edge.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"
