Description: Imports the Woodleigh School font bundle package into Munki.
Identifier: com.github.woodleighschool.munki.WoodleighFonts
ParentRecipe: com.github.woodleighschool.pkg.WoodleighFonts

MinimumVersion: "1.1.0"

Input:
  MUNKI_CATEGORY: Fonts
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Woodleigh Fonts
  pkginfo:
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Woodleigh School managed font bundle.
    developer: Woodleigh
    display_name: "%NAME%"
    icon_name: Font Book.png
    name: "%NAME%"
    unattended_install: true
  VERSION: "1.0.0"

Process:
  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pkg_path%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"