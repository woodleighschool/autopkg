---
Description: Downloads the latest version of Cricut Design Space and imports it into Munki.
Identifier: com.github.woodleighschool.munki.CricutDesignSpace
MinimumVersion: "1.1.0"
ParentRecipe: com.github.nstrauss.download.CricutDesignSpace

Input:
  NAME: Cricut Design Space
  MUNKI_CATEGORY: Creativity
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - Cricut Design Space
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Enjoy total creative freedom over your next DIY project with Cricut
      Design Space. Design, cut, or draw by connecting to Cricut Explore or
      Cricut Maker machines. Start your project from scratch or browse
      thousands of images, ready-to-make projects, and unique fonts in the
      Cricut Image Library.
    developer: Cricut
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: remove_copied_items
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: Copier
    Arguments:
      source_path: "%pathname%/%NAME%.app"
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      overwrite: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/%NAME%.app
      derive_minimum_os_version: true

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      munkiimport_appname: "%NAME%.app"
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
