---
Description: Packages Dell Command | Endpoint Configure for Microsoft Intune.
Identifier: com.github.woodleighschool.pkg.DellCommandEndpointConfigure-Win64
ParentRecipe: com.github.woodleighschool.download.DellCommandEndpointConfigure-Win64
MinimumVersion: "2.3"

Input:
  NAME: Dell Command Endpoint Configure

Process:
  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneIconExtractor
    Arguments:
      icon_size: 256
      pathname: "%pathname%"

  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneInstallerVersioner
    Arguments:
      installer_path: "%pathname%"

  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneIntuneWinPackager
    Arguments:
      installer_path: "%pathname%"
      output_path: "%RECIPE_CACHE_DIR%/%NAME%-%version%.intunewin"
