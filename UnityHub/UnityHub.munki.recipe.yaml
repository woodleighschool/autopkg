Description: Downloads the latest version of Unity Hub and imports it into Munki.
Identifier: com.github.woodleighschool.munki.UnityHub
ParentRecipe: com.github.hansen-m.download.UnityHub

MinimumVersion: "0.6.1"

Input:
  MUNKI_CATEGORY: Programming
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Unity Hub
  pkginfo:
    blocking_applications:
      - Unity Hub
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Unity Hub manages Unity installs, templates, and projects so students can
      quickly switch between versions and collaborate on creations.
    developer: Unity Technologies
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: remove_copied_items
    uninstallable: true

Process:
  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications/Unity Hub.app"
      overwrite: true
      source_path: "%pathname%/Unity Hub.app"

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Unity Hub.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      munkiimport_appname: "Unity Hub.app"
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"