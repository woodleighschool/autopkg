Identifier: com.github.woodleighschool.download.Python

Input:
  NAME: Python 3.13
  PYTHON_BRANCH: "3.13"
  SEARCH_URL: https://www.python.org/downloads/macos/

Process:
  - Processor: URLTextSearcher
    Arguments:
      re_pattern: "Python (?P<version>%PYTHON_BRANCH%\\.\\d+) - "
      url: "%SEARCH_URL%"

  - Processor: URLDownloader
    Arguments:
      filename: "python-%version%-macos11.pkg"
      url: "https://www.python.org/ftp/python/%version%/python-%version%-macos11.pkg"

  - Processor: EndOfCheckPhase

  - Processor: CodeSignatureVerifier
    Arguments:
      expected_authority_names:
        - "Developer ID Installer: Python Software Foundation (BMM5U3QVKW)"
        - "Developer ID Certification Authority"
        - "Apple Root CA"
      input_path: "%pathname%"