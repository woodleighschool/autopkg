---
Description: Packages the Epson AM-C6000 PCL6 Windows driver for Intune Win32 upload.
Identifier: com.github.woodleighschool.pkg.EpsonAM-C6000Driver-Win64
MinimumVersion: "2.3"

Input:
  PACKAGE_NAME: EpsonAM-C6000Driver
  VERSION: "2.71.00"

Process:
  - Processor: PkgRootCreator
    Arguments:
      pkgdirs: {}
      pkgroot: "%RECIPE_CACHE_DIR%/payload/%PACKAGE_NAME%"

  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/%PACKAGE_NAME%/detect.ps1"
      overwrite: true
      source_path: "%RECIPE_DIR%/Scripts/detect.ps1"

  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/%PACKAGE_NAME%/install.ps1"
      overwrite: true
      source_path: "%RECIPE_DIR%/Scripts/install.ps1"

  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/%PACKAGE_NAME%/uninstall.ps1"
      overwrite: true
      source_path: "%RECIPE_DIR%/Scripts/uninstall.ps1"

  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/%PACKAGE_NAME%/Driver"
      overwrite: true
      source_path: "%RECIPE_DIR%/Assets"

  - Processor: com.github.woodleighschool.wintune-autopkg.processors/WintuneIntuneWinPackager
    Arguments:
      force_repack: true
      installer_path: install.ps1
      output_path: "%RECIPE_CACHE_DIR%/%PACKAGE_NAME%-%VERSION%.intunewin"
      source_folder: "%RECIPE_CACHE_DIR%/payload/%PACKAGE_NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
