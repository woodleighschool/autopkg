Description: Downloads the latest pkg installer of 1Password and imports it into Munki.
Identifier: com.github.woodleighschool.munki.1Password
ParentRecipe: com.github.dataJAR-recipes.download.1Password

MinimumVersion: "1.1.0"

Input:
  MUNKI_CATEGORY: Security
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: 1Password
  pkginfo:
    blocking_applications:
      - 1Password Browser Helper.app
      - 1Password Helper (Renderer).app
      - 1Password Helper (GPU).app
      - 1Password Launcher.app
      - 1Password Helper (Plugin).app
      - 1Password Updater.app
      - 1Password.app
      - 1Password Helper.app
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      1Password makes it easy to generate, store, and autofill passwords for
      all your online accounts, on all your devices. Because weak and reused
      passwords are a leading cause of security incidents, using a password
      manager is an easy way to protect yourself, your family, or your
      business.
    developer: AgileBits Inc.
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: removepackages
    uninstallable: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/com.1password.1password.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/1Password.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"