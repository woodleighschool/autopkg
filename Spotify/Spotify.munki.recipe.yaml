---
Description: Downloads the latest version of Spotify and imports it into Munki.
Identifier: com.github.woodleighschool.munki.Spotify
MinimumVersion: "1.1.0"
ParentRecipe: com.github.autopkg.download.Spotify

Input:
  NAME: Spotify
  DOWNLOAD_ARCH: ARM64
  MUNKI_CATEGORY: Media
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - Spotify
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Spotify is a digital music service that gives you access to millions of
      songs.
    developer: Spotify
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: remove_copied_items
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true
    postinstall_script: |-
      #!/bin/bash
      /bin/chmod -R go+rX /Applications/Spotify.app

Process:
  - Processor: Copier
    Arguments:
      source_path: "%pathname%/Spotify.app"
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications/Spotify.app"
      overwrite: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Spotify.app
      derive_minimum_os_version: true

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      munkiimport_appname: Spotify.app
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
