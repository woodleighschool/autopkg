---
Description: Downloads the latest version of Docker Desktop and imports it into Munki.
Identifier: com.github.woodleighschool.munki.DockerDesktop
ParentRecipe: com.github.homebysix.download.DockerDesktop

MinimumVersion: "1.1.0"

Input:
  MUNKI_CATEGORY: Programming
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Docker Desktop
  pkginfo:
    blocking_applications:
      - Docker Desktop
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Docker Desktop is collaborative containerization software for developers.
    developer: Docker
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    postinstall_script: |-
      #!/bin/bash
      CONSOLE_USER=$(/usr/bin/stat -f%Su /dev/console)
      if [ "$CONSOLE_USER" != "root" ] && [ -n "$CONSOLE_USER" ]; then
        echo "Installing Docker Desktop for user: $CONSOLE_USER"
        /Applications/Docker.app/Contents/MacOS/install --accept-license --user="$CONSOLE_USER"
      else
        echo "No user logged in, cannot complete Docker Desktop installation"
        exit 1
      fi
      exit 0
    postuninstall_script: |-
      #!/bin/bash
      DOCKER_PATHS=(
        "/Library/Application Support/com.docker.docker"
        "/Library/LaunchDaemons/com.docker.socket.plist"
        "/Library/LaunchDaemons/com.docker.vmnetd.plist"
        "/Library/Logs/com.docker.dockerd.log"
        "/Library/Logs/Docker Desktop"
        "/Library/PrivilegedHelperTools/com.docker.hyperkit"
        "/Library/PrivilegedHelperTools/com.docker.socket"
        "/Library/PrivilegedHelperTools/com.docker.vmnetd"
        "/private/var/run/docker.sock"
        "/private/var/tmp/com.docker.vmnetd.socket"
        "/usr/local/bin/docker-compose"
        "/usr/local/bin/docker-credential-desktop"
        "/usr/local/bin/docker-credential-ecr-login"
        "/usr/local/bin/docker-credential-osxkeychain"
        "/usr/local/bin/docker"
        "/usr/local/bin/hyperkit"
        "/usr/local/bin/kubectl.docker"
        "/usr/local/bin/kubectl"
        "/usr/local/bin/vpnkit"
      )
      safe_remove() {
        if [ -e "$1" ]; then
          echo "Removing: $1"
          rm -rf "$1"
        fi
      }
      for path in "${DOCKER_PATHS[@]}"; do
        safe_remove "$path"
      done
      exit 0
    preinstall_script: |-
      #!/bin/bash
      CONSOLE_USER=$(/usr/bin/stat -f%Su /dev/console)
      if [ "$CONSOLE_USER" = "root" ] || [ -z "$CONSOLE_USER" ]; then
        echo "No user logged in or at login window. Deferring installation."
        exit 1
      fi
      echo "User $CONSOLE_USER is logged in and Docker needs updating. OK to proceed with installation."
      exit 0
    preuninstall_script: |-
      #!/bin/bash
      /Applications/Docker.app/Contents/MacOS/uninstall
      /Applications/Docker.app/Contents/MacOS/install remove-kube-host
      /Applications/Docker.app/Contents/MacOS/install remove-socket-symlink-on-startup
      /Applications/Docker.app/Contents/MacOS/install remove-vmnetd
      exit 0
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: remove_copied_items
    uninstallable: true
  PLATFORM_ARCH: arm64

Process:
  - Processor: MunkiPkginfoMerger
    Arguments:
      additional_pkginfo:
        version: "%version%"

  - Processor: Copier
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/%NAME%-%PLATFORM_ARCH%-%version%.dmg"
      overwrite: true
      source_path: "%pathname%"

  - Processor: MunkiImporter
    Arguments:
      munkiimport_appname: Docker.app
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%-%PLATFORM_ARCH%-%version%.dmg"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%pathname%"
