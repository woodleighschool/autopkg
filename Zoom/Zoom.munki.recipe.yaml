Description: Downloads the latest version of Zoom and imports it into Munki.
Identifier: com.github.woodleighschool.munki.Zoom
ParentRecipe: com.github.hansen-m.download.zoomus

MinimumVersion: "1.1.0"

Input:
  MUNKI_CATEGORY: Collaboration
  MUNKI_REPO_SUBDIR: apps/%NAME%
  NAME: Zoom
  pkginfo:
    blocking_applications:
      - zoom.us
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Zoom is a cloud-based video conferencing platform that can be used for video conferencing
      meetings, audio conferencing, webinars, meeting recordings, and live chat.
    developer: Zoom
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    uninstall_method: removepackages
    uninstallable: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/unpacked"
      flat_pkg_path: "%pathname%"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications"
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpacked/zoomus.pkg/Payload"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      derive_minimum_os_version: true
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/zoom.us.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      NAME: "%NAME%"
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/zoom.us.app"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpacked"
        - "%RECIPE_CACHE_DIR%/payload"