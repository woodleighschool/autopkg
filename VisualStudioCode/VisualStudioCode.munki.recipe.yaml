---
Description: Downloads the latest version of Visual Studio Code and imports it into Munki.
Identifier: com.github.woodleighschool.munki.VisualStudioCode
MinimumVersion: "1.1.0"
ParentRecipe: com.github.jc0b.download.VisualStudioCode

Input:
  NAME: Visual Studio Code
  DOWNLOAD_ARCH: arm64
  MUNKI_CATEGORY: Programming
  MUNKI_REPO_SUBDIR: apps/%NAME%
  pkginfo:
    blocking_applications:
      - Visual Studio Code.app
    catalogs:
      - testing
    category: "%MUNKI_CATEGORY%"
    description: >-
      Visual Studio Code is a code editor redefined and optimized for building
      and debugging modern web and cloud applications.
    developer: Microsoft
    display_name: "%NAME%"
    icon_name: "%NAME%.png"
    name: "%NAME%"
    uninstall_method: remove_copied_items
    uninstallable: true
    unattended_install: true
    unattended_uninstall: true
    postinstall_script: |-
      #!/bin/bash
      ln -sf "/Applications/Visual Studio Code.app/Contents/Resources/app/bin/code" "/usr/local/bin/code"
    postuninstall_script: |-
      #!/bin/bash
      rm -f "/usr/local/bin/code"

Process:
  - Processor: Copier
    Arguments:
      source_path: "%pathname%/Visual Studio Code.app"
      destination_path: "%RECIPE_CACHE_DIR%/payload/Applications/Visual Studio Code.app"
      overwrite: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      installs_item_paths:
        - /Applications/Visual Studio Code.app
      derive_minimum_os_version: true

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      munkiimport_appname: "%NAME%.app"
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: com.github.woodleighschool.processors/MunkiIconExtractor
    Arguments:
      pathname: "%RECIPE_CACHE_DIR%/payload/Applications/%NAME%.app"
      NAME: "%NAME%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
